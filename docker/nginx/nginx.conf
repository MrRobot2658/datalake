worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── 根治 stale upstream DNS ───────────────────────────────────────────────
    # 用 docker 内置 DNS（127.0.0.11）+ proxy_pass 变量形式，让 nginx 按需在请求时
    # 重新解析后端主机名。这样后端容器重建（IP 变化）后，无需重启/reload nginx。
    #   关键点：proxy_pass 里一旦出现变量，nginx 就不会在启动时把主机名解析并缓存，
    #   而是交给 resolver 在运行时解析（valid=10s 控制缓存时长）。
    #   因此这里【不能】用 upstream 块（那会在启动时解析一次并永久缓存）。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Swagger 子路径前缀（仅 ID-Mapping / SQL Engine 需要 X-Forwarded-Prefix）。
    # 用 map 统一计算，避免在 location 里再写 proxy_set_header —— 否则会覆盖（而非追加）
    # 下面 http 级的公共头集合（nginx 的 proxy_set_header 非叠加继承）。
    map $uri $fwd_prefix {
        default                "";
        ~^/ID-Mapping/         "/ID-Mapping";
        "~^/SQL Engine/"       "/SQL Engine";
    }

    # 公共代理头（统一在 http 级声明一次，所有 location 继承同一套）
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix $fwd_prefix;

    # CDP API Key 注入（由 envsubst 从 CDP_API_KEY 渲染；详见 cdp_apikey.conf.template）。
    # 放在 http 级 → 所有 location 继承，浏览器经网关访问 sql-engine 时自动带上鉴权头。
    include /etc/nginx/conf.d/cdp_apikey.conf;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 后端主机名（变量形式 → 触发运行时解析）
        set $sql_engine "sql-engine:8000";
        set $assistant  "assistant:8000";
        set $id_mapping "id-mapping:8000";

        # 首页
        location = / {
            try_files /index.html =404;
        }

        # 旧 /app 入口 → 统一迁到 CDP 控制台
        location = /app { return 302 /console/; }
        location = /app/ { return 302 /console/; }

        # CDP 控制台（React SPA）—— 客户端路由回退到 index.html
        location = /console {
            return 302 /console/;
        }

        location /console/ {
            alias /usr/share/nginx/console/;
            try_files $uri $uri/ /console/index.html;
        }

        # SPA → sql-engine 的统一 API 前缀（去掉 /api 再转发）
        location ~ ^/api/(?<apipath>.*)$ {
            client_max_body_size 200m;   # 知识库多模态文件上传
            proxy_pass http://$sql_engine/$apipath$is_args$args;
        }

        # 智能助手（assistant 服务）—— 去掉 /assistant 前缀；chat 可能较慢，放宽超时
        location ~ ^/assistant/(?<asstpath>.*)$ {
            proxy_pass http://$assistant/$asstpath$is_args$args;
            proxy_read_timeout 120s;
        }

        # ID-Mapping → Swagger / API
        location = /ID-Mapping {
            return 302 /ID-Mapping/docs;
        }

        location ~ ^/ID-Mapping/(?<idmpath>.*)$ {
            proxy_pass http://$id_mapping/$idmpath$is_args$args;
        }

        # SQL Engine Swagger（支持空格与 %20 两种路径；location 匹配的是解码后的 $uri）
        location = "/SQL Engine" {
            return 302 "/SQL Engine/docs";
        }

        location = /SQL%20Engine {
            return 302 /SQL%20Engine/docs;
        }

        location ~ "^/SQL Engine/(?<sqlpath>.*)$" {
            proxy_pass http://$sql_engine/$sqlpath$is_args$args;
        }

        # 用户导入 → ID-Mapping（需在 users 通用规则之前；精确匹配优先级最高）
        location = /users/import {
            proxy_pass http://$id_mapping/users/import$is_args$args;
        }

        # SQL Engine API 根路径直通（Swagger Try it out / 便捷调用）
        location ~ ^/(nl-query|templates|query|groups|users|tags)(/.*)?$ {
            proxy_pass http://$sql_engine$request_uri;
        }

        # ID-Mapping API 根路径直通
        location ~ ^/(events|mapping|profile|wide|merge-log)(/.*)?$ {
            proxy_pass http://$id_mapping$request_uri;
        }
    }
}
