name: dataagent

services:
  mysql:
    image: mysql:8.0
    container_name: dataagent-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dataagent
      MYSQL_USER: dataagent
      MYSQL_PASSWORD: dataagent123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/mysql/conf.d/scale.cnf:/etc/mysql/conf.d/zz-scale.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dataagent-net

  redis:
    image: redis:7-alpine
    container_name: dataagent-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dataagent-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: dataagent-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - dataagent-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dataagent-kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9092"
      - "29094:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - dataagent-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dataagent-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    environment:
      KAFKA_PARTITIONS_PREMIUM: ${KAFKA_PARTITIONS_PREMIUM:-4}
      KAFKA_PARTITIONS_STANDARD: ${KAFKA_PARTITIONS_STANDARD:-2}
      KAFKA_PARTITIONS_SHARED: ${KAFKA_PARTITIONS_SHARED:-4}
      KAFKA_REPLICATION: ${KAFKA_REPLICATION:-1}
      SCALE_TIER: ${SCALE:-dev}
    command:
      - |
        PP=$${KAFKA_PARTITIONS_PREMIUM:-4}
        PS=$${KAFKA_PARTITIONS_STANDARD:-2}
        PSH=$${KAFKA_PARTITIONS_SHARED:-4}
        RF=$${KAFKA_REPLICATION:-1}
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic tenant-1001-events --partitions $$PP --replication-factor $$RF
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic tenant-1002-events --partitions $$PS --replication-factor $$RF
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic shared-tenant-events --partitions $$PSH --replication-factor $$RF
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic enriched-1001-events --partitions $$PP --replication-factor $$RF
        echo "Kafka topics ready (tier=$${SCALE_TIER:-dev}, partitions=$$PP/$$PS/$$PSH)"
    networks:
      - dataagent-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dataagent-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - dataagent-net

  nginx:
    image: nginx:1.27-alpine
    container_name: dataagent-nginx
    depends_on:
      id-mapping:
        condition: service_started
      sql-engine:
        condition: service_started
      assistant:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    ports:
      - "8080:80"
    environment:
      # 网关向后端注入的 CDP API Key（envsubst 渲染 cdp_apikey.conf.template）。留空 = 不鉴权。
      CDP_API_KEY: ${CDP_API_KEY:-}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # envsubst 入口在启动时把该模板渲染成 /etc/nginx/conf.d/cdp_apikey.conf
      - ./docker/nginx/cdp_apikey.conf.template:/etc/nginx/templates/cdp_apikey.conf.template:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro
      # Data Agent 控制台：由 frontend 服务生产构建产出，写入 frontend_dist 卷，nginx 托管于 /console/
      - frontend_dist:/usr/share/nginx/console:ro
    networks:
      - dataagent-net
    restart: unless-stopped

  # 前端：生产构建（一次性）→ 把 dist 写入 frontend_dist 卷，由 nginx 静态托管。
  # 加入 compose 后随栈一起起，无需单独 npm run dev。
  frontend:
    image: node:20-bookworm-slim
    container_name: dataagent-frontend-build
    working_dir: /app
    environment:
      # nginx 网关把 SPA 挂在 /console/ 下，构建产物的资源路径与路由 basename 都要带该前缀
      VITE_BASE: /console/
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_dist:/out
    command: sh -c "npm ci && npm run build && rm -rf /out/* && cp -r dist/. /out/"
    networks:
      - dataagent-net

  # 智能助手：DeepSeek 对话 + 桥接 MCP（services/mcp 以 stdio 拉起）+ 后台任务（接 reverse-ETL 调度模拟）
  assistant:
    build:
      context: ./services/assistant
      dockerfile: Dockerfile
    container_name: dataagent-assistant
    depends_on:
      sql-engine:
        condition: service_started
    ports:
      - "8004:8000"
    env_file:
      - .env
    environment:
      SQL_ENGINE_URL: http://sql-engine:8000
      MCP_SERVER_PATH: /app/mcp/server.py
      MCP_SQL_ENGINE_URL: http://sql-engine:8000
      # 聊天记录持久化（按用户）
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: dataagent
      MYSQL_PASSWORD: dataagent123
      MYSQL_DATABASE: dataagent
      # MCP server 默认往 services/mcp/logs 写日志，但该目录以只读挂载，重定向到可写路径
      MCP_LOG_DIR: /tmp/mcp-logs
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - ./services/mcp:/app/mcp:ro
      # 功能页面路由表，供智能助手「打开页面」导航
      - ./docs/page-routes.md:/app/page-routes.md:ro
    networks:
      - dataagent-net
    restart: unless-stopped

  id-mapping:
    build:
      context: ./services/id-mapping
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8001:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: dataagent
      MYSQL_PASSWORD: dataagent123
      MYSQL_DATABASE: dataagent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPICS: tenant-1001-events,tenant-1002-events,shared-tenant-events
      REDIS_TTL_SECONDS: 2592000
      ROOT_PATH: /ID-Mapping
    networks:
      - dataagent-net
    restart: unless-stopped

  sql-engine:
    build:
      context: ./services/sql-engine
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      OLAP_BACKEND: mysql
      OLAP_HOST: mysql
      OLAP_PORT: 3306
      OLAP_USER: dataagent
      OLAP_PASSWORD: dataagent123
      OLAP_DATABASE: dataagent
      SCALE_TIER: ${SCALE:-dev}
      DORIS_BE_SHARDS: ${DORIS_BE_SHARDS:-1}
      # 数据底座统计：实时查 Kafka topic 数（容器内监听地址）+ Flink(id-mapping) 任务数
      KAFKA_BOOTSTRAP: kafka:29092
      ID_MAPPING_URL: http://id-mapping:8000
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      # CDP API Key 鉴权：非空时校验所有请求的 X-API-Key 头（health/docs 放行）。
      CDP_API_KEY: ${CDP_API_KEY:-}
      ROOT_PATH: "/SQL Engine"
      # 可视化编排 Pipelines 对接的真实调度器（Apache Airflow）
      AIRFLOW_API_URL: http://airflow:8080/api/v1
      AIRFLOW_USER: ${AIRFLOW_USER:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      AIRFLOW_DAG_ID: ${AIRFLOW_DAG_ID:-dataagent_pipeline}
      AIRFLOW_UI_URL: ${AIRFLOW_UI_URL:-http://localhost:8088}
      # 知识库文件存储目录（云盘式多模态存储）
      KB_STORAGE_DIR: /data/kb
    volumes:
      - kb_data:/data/kb
    networks:
      - dataagent-net
    restart: unless-stopped

  # Apache Airflow（单容器 dev：scheduler + webserver，SQLite + 串行执行器）
  # 作为可视化编排 Pipelines 的真实调度后端；UI 在 :8088（admin/admin），DAG: dataagent_pipeline
  airflow:
    image: apache/airflow:2.9.3
    container_name: dataagent-airflow
    ports:
      - "8088:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      # 开启 REST API 的 basic-auth，供 sql-engine 触发 DAG
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      TZ: Asia/Shanghai
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow_data:/opt/airflow
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname a --lastname b --role Admin --email admin@example.com || true
        airflow scheduler & exec airflow webserver
    networks:
      - dataagent-net
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  frontend_dist:
  airflow_data:
  kb_data:

networks:
  dataagent-net:
    driver: bridge
